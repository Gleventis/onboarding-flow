services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: onboarding
      POSTGRES_PASSWORD: onboarding
      POSTGRES_DB: onboarding
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onboarding"]
      interval: 2s
      timeout: 5s
      retries: 10

  app:
    image: onboarding-flow
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://onboarding:onboarding@db:5432/onboarding
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
